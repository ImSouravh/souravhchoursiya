<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ================= SEO OPTIMIZATIONS ================= -->
    <!-- 1. Primary Meta Tags -->
    <title>Mr. Souravh Choursiya | Student | University of Delhi</title>
    <meta
      name="title"
      content="Mr. Souravh Choursiya | Student | University of Delhi"
    />
    <meta
      name="description"
      content="Souravh Choursiya is an M.Com student of Delhi University and a keen researcher in the area of Finance and International Business."
    />
    <meta
      name="keywords"
      content="Souravh Choursiya, Finance and International Business, Conceptual Synthesis, Security Analysis, University of Delhi, Researcher, AI"
    />
    <meta name="author" content="Mr. Souravh Choursiya" />

    <!-- 2. Open Graph / Facebook (For link sharing previews) -->
    <meta property="og:type" content="profile" />
    <meta
      property="og:url"
      content="https://your-github-username.github.io/my-academic-profile/"
    />
    <meta
      property="og:title"
      content="Mr. Souravh Choursiya - Researcher Profile"
    />
    <meta
      property="og:description"
      content="Student at University of Delhi focusing on Finance and International Business."
    />
    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=1200&h=630"
    />

    <!-- 3. Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://your-github-username.github.io/my-academic-profile/"
    />
    <meta
      property="twitter:title"
      content="Mr. Souravh Choursiya - Researcher Profile"
    />
    <meta
      property="twitter:description"
      content="Student at University of Delhi focusing on Finance and International Business."
    />
    <meta
      property="twitter:image"
      content="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=1200&h=630"
    />

    <!-- 4. Schema.org Structured Data (Crucial for Google Knowledge Panels and Scholar) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Souravh Choursiya",
        "honorificPrefix": "Mr.",
        "jobTitle": "Student",
        "affiliation": {
          "@type": "Organization",
          "name": "University of Delhi"
        },
        "url": "https://your-github-username.github.io/my-academic-profile/",
        "image": "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=256&h=256",
        "sameAs": [
          "https://scholar.google.com/citations?user=YOUR_ID",
          "https://orcid.org/0000-0002-1234-5678"
        ],
        "knowsAbout": ["Finance", "International Business"]
      }
    </script>
    <!-- ===================================================== -->

    <!-- Google tag (gtag.js) - Replace G-XXXXXXXXXX with your actual Measurement ID -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      // Replace G-XXXXXXXXXX here as well
      gtag("config", "G-XXXXXXXXXX");
    </script>

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-50">
    <!-- Fallback for basic crawlers that don't execute JavaScript -->
    <noscript>
      <div style="padding: 20px; font-family: sans-serif">
        <h1>Mr. Souravh Choursiya</h1>
        <h2>Student at University of Delhi</h2>
        <p>Research focusing on Finance and International Business.</p>
        <p>
          Please enable JavaScript to view the full interactive profile and
          publication list.
        </p>
      </div>
    </noscript>

    <div id="root"></div>

    <script type="text/babel">
      // --- INLINE ICONS ---
      // Replacing Lucide imports with inline SVG components for standalone browser compatibility
      const Mail = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      );
      const BookOpen = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
      );
      const Building2 = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" />
          <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" />
          <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" />
          <path d="M10 6h4" />
          <path d="M10 10h4" />
          <path d="M10 14h4" />
          <path d="M10 18h4" />
        </svg>
      );
      const MapPin = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      );
      const ExternalLink = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M15 3h6v6" />
          <path d="M10 14 21 3" />
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
        </svg>
      );
      const FileText = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
          <path d="M14 2v4a2 2 0 0 0 2 2h4" />
          <path d="M10 9H8" />
          <path d="M16 13H8" />
          <path d="M16 17H8" />
        </svg>
      );
      const ChevronRight = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="m9 18 6-6-6-6" />
        </svg>
      );
      const GraduationCap = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M21.42 10.922a2 2 0 0 0-.019-3.838L12.83 4.018a2 2 0 0 0-1.66 0L2.6 7.08a2 2 0 0 0 0 3.832l8.57 3.064a2 2 0 0 0 1.66 0z" />
          <path d="M22 10v6" />
          <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5" />
        </svg>
      );
      const Link2 = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M9 17H7A5 5 0 0 1 7 7h2" />
          <path d="M15 7h2a5 5 0 1 1 0 10h-2" />
          <line x1="8" x2="16" y1="12" y2="12" />
        </svg>
      );

      // --- MAIN APP COMPONENT ---
      function ResearcherProfile() {
        // Edit this object with your actual data
        const profileData = {
          personal: {
            name: "Mr. Souravh Choursiya",
            initials: "SC",
            photoUrl: "#", // Add your photo URL here
            role: "Student",
            affiliation: "University of Delhi",
            department: "Commerce",
            location: "New Delhi, India",
            email: "souravhchoursiya@commerce.du.ac.in",
            googleScholar: "#",
            orcid: "#",
          },
          bio: "Souravh Choursiya is a Student in the Department of Commerce at University of Delhi. His research focuses on the Finance and International Business.",
          interests: [
            "Finance",
            "International Business",
            "Security Analysis",
            "Conceptual Synthesis",
          ],
          publications: [
            {
              id: 1,
              year: "Soon...",
              title: "Soon...",
              authors: "Choursiya, S.",
              venue: "Soon...",
              link: "#",
              type: "Journal",
            },
          ],
        };

        const formatAuthors = (authorsStr) => {
          const parts = authorsStr.split("Choursiya, S.");
          if (parts.length === 1) return authorsStr;
          return (
            <React.Fragment>
              {parts[0]}
              <strong className="text-slate-900 font-bold">
                Choursiya, S.
              </strong>
              {parts[1]}
            </React.Fragment>
          );
        };

        return (
          <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
            <div className="h-32 bg-gradient-to-r from-slate-800 to-indigo-900 w-full"></div>

            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 -mt-16 pb-12">
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                {/* LEFT SIDEBAR: PROFILE CARD */}
                <div className="lg:col-span-4 flex flex-col">
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 flex flex-col items-center text-center relative">
                    <div className="w-32 h-32 rounded-full bg-gradient-to-br from-indigo-500 to-blue-600 border-4 border-white shadow-lg flex items-center justify-center text-white text-4xl font-bold tracking-wider mb-5 overflow-hidden">
                      {profileData.personal.photoUrl ? (
                        <img
                          src={profileData.personal.photoUrl}
                          alt={profileData.personal.name}
                          className="w-full h-full object-cover"
                        />
                      ) : (
                        profileData.personal.initials
                      )}
                    </div>

                    <h1 className="text-2xl font-bold text-slate-900 mb-1">
                      {profileData.personal.name}
                    </h1>
                    <p className="text-indigo-600 font-medium text-sm mb-1">
                      {profileData.personal.role}
                    </p>
                    <p className="text-slate-500 text-sm mb-6 flex flex-col items-center gap-1">
                      <span className="flex items-center">
                        <Building2 className="w-3.5 h-3.5 mr-1" />{" "}
                        {profileData.personal.affiliation}
                      </span>
                      <span>{profileData.personal.department}</span>
                    </p>

                    <hr className="w-full border-slate-100 mb-6" />

                    <div className="w-full flex flex-wrap justify-center gap-x-6 gap-y-3 text-sm text-slate-600">
                      <a
                        href={`mailto:${profileData.personal.email}`}
                        className="flex items-center hover:text-indigo-600 transition-colors group"
                      >
                        <Mail className="w-4 h-4 mr-1.5 text-slate-400 group-hover:text-indigo-500 transition-colors" />
                        {profileData.personal.email}
                      </a>
                      <div className="flex items-center">
                        <MapPin className="w-4 h-4 mr-1.5 text-slate-400" />
                        {profileData.personal.location}
                      </div>
                      <a
                        href={profileData.personal.googleScholar}
                        className="flex items-center hover:text-indigo-600 transition-colors group"
                      >
                        <GraduationCap className="w-4 h-4 mr-1.5 text-slate-400 group-hover:text-indigo-500 transition-colors" />
                        Google Scholar
                        <ExternalLink className="w-3 h-3 ml-1 opacity-50" />
                      </a>
                      <div className="flex items-center">
                        <Link2 className="w-4 h-4 mr-1.5 text-slate-400" />
                        ORCID: {profileData.personal.orcid}
                      </div>
                    </div>
                  </div>
                </div>

                {/* RIGHT MAIN CONTENT */}
                <div className="lg:col-span-8 lg:mt-16 space-y-8">
                  <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                    <h2 className="text-xl font-bold text-slate-900 mb-4 flex items-center">
                      <div className="w-8 h-8 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center mr-3">
                        <FileText className="w-4 h-4" />
                      </div>
                      Biography
                    </h2>
                    <p className="text-slate-600 leading-relaxed">
                      {profileData.bio}
                    </p>
                  </section>

                  <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                    <h2 className="text-xl font-bold text-slate-900 mb-4 flex items-center">
                      <div className="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center mr-3">
                        <BookOpen className="w-4 h-4" />
                      </div>
                      Research Interests
                    </h2>
                    <div className="flex flex-wrap gap-2">
                      {profileData.interests.map((interest, idx) => (
                        <span
                          key={idx}
                          className="px-3 py-1.5 bg-slate-100 text-slate-700 text-sm font-medium rounded-lg border border-slate-200"
                        >
                          {interest}
                        </span>
                      ))}
                    </div>
                  </section>

                  <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                    <div className="flex justify-between items-end mb-6">
                      <h2 className="text-xl font-bold text-slate-900 flex items-center">
                        <div className="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center mr-3">
                          <BookOpen className="w-4 h-4" />
                        </div>
                        Selected Publications
                      </h2>
                      <a
                        href={profileData.personal.googleScholar}
                        className="text-sm font-medium text-indigo-600 hover:text-indigo-800 flex items-center transition-colors"
                      >
                        View full list on Google Scholar{" "}
                        <ChevronRight className="w-4 h-4 ml-0.5" />
                      </a>
                    </div>

                    <div className="space-y-6">
                      {profileData.publications.map((pub) => (
                        <div
                          key={pub.id}
                          className="group relative pl-4 sm:pl-6 border-l-2 border-slate-200 hover:border-indigo-500 transition-colors"
                        >
                          <div className="absolute -left-[5px] top-2 w-2 h-2 rounded-full bg-slate-300 group-hover:bg-indigo-500 transition-colors"></div>

                          <div className="flex flex-col sm:flex-row sm:items-baseline sm:justify-between mb-1">
                            <h3 className="text-base font-bold text-slate-900 group-hover:text-indigo-700 transition-colors pr-4">
                              <a href={pub.link} className="hover:underline">
                                {pub.title}
                              </a>
                            </h3>
                            <span className="shrink-0 inline-block px-2.5 py-1 bg-slate-100 text-slate-600 text-xs font-bold rounded-md mt-2 sm:mt-0">
                              {pub.year}
                            </span>
                          </div>

                          <p className="text-sm text-slate-600 mb-1">
                            {formatAuthors(pub.authors)}
                          </p>

                          <p className="text-sm font-medium text-slate-500 italic flex items-center">
                            {pub.venue}
                            {pub.type === "Journal" && (
                              <span className="ml-3 not-italic text-xs px-2 py-0.5 bg-blue-50 text-blue-600 rounded border border-blue-100">
                                Journal
                              </span>
                            )}
                            {pub.type === "Conference" && (
                              <span className="ml-3 not-italic text-xs px-2 py-0.5 bg-emerald-50 text-emerald-600 rounded border border-emerald-100">
                                Conference
                              </span>
                            )}
                          </p>
                        </div>
                      ))}
                    </div>
                  </section>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // --- RENDER APP ---
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ResearcherProfile />);
    </script>
  </body>
</html>
